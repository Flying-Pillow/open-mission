name: 'Setup Environment'
description: 'Prepare Node and pnpm tooling for Mission CI and release workflows.'
runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.0.8

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install Workspace Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
